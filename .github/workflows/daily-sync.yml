name: Shopify Feishu Manual Sync

on:
  workflow_dispatch:
    inputs:
      target_table_url:
        description: "飞书出单表链接"
        required: true
        type: string
      start_date:
        description: "开始日期，例如 2026-06-01"
        required: true
        type: string
      end_date:
        description: "结束日期，例如 2026-06-15"
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync script
        run: python main.py
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          MAIN_TABLE_ID: ${{ secrets.MAIN_TABLE_ID }}
          SKU_TABLE_ID: ${{ secrets.SKU_TABLE_ID }}
          TARGET_TABLE_URL: ${{ inputs.target_table_url }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
